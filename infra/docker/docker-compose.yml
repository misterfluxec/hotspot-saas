# Docker Compose para HotSpot SaaS
# Configuración para desarrollo y producción

version: '3.8'

services:
  # API Fastify
  api:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.api
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://hotspot_admin:HotSpot2024Ecuador@host.docker.internal:5433/hotspot_saas
      - REDIS_URL=redis://:Redis2024Safe@host.docker.internal:6379
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    depends_on:
      - redis
    networks:
      - hotspot-network

  # Dashboard Next.js
  dashboard:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.dashboard
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NEXT_PUBLIC_DOMAIN_BASE=labodegaec.com
    depends_on:
      - api
    networks:
      - hotspot-network

  # Portal Next.js (para portales cautivos)
  portal:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.portal
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NEXT_PUBLIC_DOMAIN_BASE=labodegaec.com
    depends_on:
      - api
    networks:
      - hotspot-network

  # Redis local (opcional, ya usamos Redis externo)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --requirepass Redis2024Safe
    volumes:
      - redis_data:/data
    networks:
      - hotspot-network
    profiles:
      - local

  # Nginx para reverse proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - api
      - dashboard
      - portal
    networks:
      - hotspot-network
    profiles:
      - production

volumes:
  redis_data:

networks:
  hotspot-network:
    driver: bridge
